version: '3.9'

services:
  backend:
    build: ./backend
    container_name: gtg-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////app/data/goldtrade.db
      - MAX_TRADES_PER_DAY=3
      - MAX_DAILY_LOSS_PCT=2.0
      - RISK_PER_TRADE_PCT=1.0
      - ATR_EXPANSION_MULTIPLIER=1.5
      - NEWS_WINDOW_MINUTES=30
    volumes:
      - gtg-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: gtg-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  gtg-data:
